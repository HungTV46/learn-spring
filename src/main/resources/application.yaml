spring:
  datasource:
    url: ${DBMS_CONNECTION:jdbc:mysql://localhost:3306/learn_spring}
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: ${DBMS_USERNAME:root}
    password: ${DBMS_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: update # Cài đặt cho môi trường dev
    show-sql: true     # Bật hiển thị SQL
    properties:
      hibernate:
        format_sql: true # Tự động format câu lệnh SQL cho dễ đọc

